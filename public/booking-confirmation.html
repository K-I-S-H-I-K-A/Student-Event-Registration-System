<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER (same as main site) -->
    <header>
        <h2>LOGO</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="my_bookings.html">My Bookings</a>
            <a href="profile.html" onclick="goToProfile(); return false;">My Profile</a>
        </nav>
    </header>

    <!-- CONFIRMATION PAGE -->
    <div class="confirmation-container">

        <div class="confirmation-header">
            Owner
        </div>

        <div class="confirmation-success">
            <h2>✔ Booking Confirmed!</h2>
            <p>Your workspace has been successfully booked.</p>
            <p>A confirmation email has been sent to you.</p>
            <p id="redirect-msg">Redirecting to My Bookings in <span id="countdown">5</span>s...</p>
        </div>

        <div class="confirmation-details">
            <h3>Booking Details</h3>

            <div class="confirmation-content">
                <div class="confirmation-image"></div>

                <div class="confirmation-info" id="confirmation-info">
                    <!-- Filled dynamically -->
                </div>
            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        Contact | Terms | Privacy | 2026 Workspace App
    </footer>

</body>

<script src="/app.js"></script>
<script>
    // Redirect to My Bookings after 5 seconds
    let seconds = 5;
    const countdownEl = document.getElementById("countdown");
    const interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = "my_bookings.html";
        }
    }, 1000);
</script>

</html>
