<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo-link"><h2>LOGO</h2></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="profile.html" onclick="goToProfile(); return false;">Profile</a>
            <button id="auth-btn" onclick="handleAuth()">Sign In</button>
        </nav>
    </header>

    <div class="my-bookings">

        <!-- TOP BAR -->
        <div class="top-bar">
            <h1>My Bookings</h1>

            <div class="actions">
                <button class="btn primary">+ New Booking</button>
                <button class="btn">🔍 Search Bookings</button>
            </div>
        </div>

        <!-- SUMMARY CARDS -->
        <div class="cards">

            <div class="card" onclick="filterBookings('all')">
                <h4>ALL</h4>
                <h2 id="all-count">0</h2>
            </div>

            <div class="card" onclick="filterBookings('upcoming')">
                <h4>UPCOMING</h4>
                <h2 id="upcoming-count">0</h2>
                <p id="next-booking">Next: -</p>
            </div>

            <div class="card" onclick="filterBookings('pending')">
                <h4>PENDING</h4>
                <h2 id="pending-count">0</h2>
                <p>Awaiting Confirmation</p>
            </div>

            <div class="card" onclick="filterBookings('completed')">
                <h4>COMPLETED</h4>
                <h2 id="completed-count">0</h2>
            </div>

        </div>
        <!-- BOOKINGS (DYNAMIC) -->
        <div id="bookings-list"></div>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>Contact | Terms | Privacy | Workspace 2026</p>
    </footer>

    <script src="/app.js"></script>

</body>

</html>
