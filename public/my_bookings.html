<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadBookings()">

<!-- HEADER -->
<header>
    <h2>LOGO</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="#" class="active">Bookings</a>
        <a href="#">Profile</a>
    </nav>
</header>

<div class="my-bookings">

    <!-- TOP BAR -->
    <div class="top-bar">
        <h1>My Bookings</h1>

        <div class="actions">
            <button class="btn primary">+ New Booking</button>
            <button class="btn">🔍 Search Bookings</button>
        </div>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="cards">

        <div class="card">
            <h4>UPCOMING</h4>
            <h2 id="upcoming-count">0</h2>
            <p id="next-booking">Next: -</p>
        </div>

        <div class="card">
            <h4>PENDING</h4>
            <h2 id="pending-count">0</h2>
            <p>Awaiting Confirmation</p>
        </div>

        <div class="card">
            <h4>COMPLETED</h4>
            <h2 id="completed-count">0</h2>
        </div>

        <div class="card">
            <h4>CALENDAR</h4>
            <p style="font-size: 30px;">📅</p>
        </div>

    </div>

    <!-- BOOKINGS (DYNAMIC) -->
    <div id="bookings-list"></div>

</div>

<!-- FOOTER -->
<footer>
    <p>Contact | Terms | Privacy | Workspace 2026</p>
</footer>

<script src="/app.js"></script>

</body>
</html>
