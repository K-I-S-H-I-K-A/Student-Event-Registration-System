<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <a href="index.html" class="logo-link">
            <h2>LOGO</h2>
        </a>
        <nav>
            <a href="about_us.html">About us</a>
            <a href="my_bookings.html">My Bookings</a>
            <a href="profile.html" onclick="goToProfile(); return false;">My Profile</a>
            <button id="auth-btn" onclick="handleAuth()">Sign In</button>
        </nav>
    </header>

    <section class="hero">
        <h1>Find Your Perfect Workspace Anytime, Anywhere</h1>
        <div class="search-wrapper">
            <input id="searchInput" class="search-box" type="text" placeholder="Search Location..."
                oninput="handleSearch()" />

            <div id="searchDropdown" class="search-dropdown"></div>
        </div>

        <div class="filter-container">
            <button id="filterBtn">Filter</button>

            <div id="filterMenu" class="filter-menu hidden">

                <!-- Amenities -->
                <label>Amenities</label>
                <select id="amenityFilter">
                    <option value="">Any</option>
                    <option value="Parking Space">Parking Space</option>
                    <option value="Public Transport">Public Transport</option>
                    <option value="High Speed Wifi">Wifi</option>
                    <option value="transit">Transit</option>
                </select>

                <!-- Neighbourhood -->
                <label>Neighbourhood</label>
                <select id="neighbourhoodFilter">
                    <option value="">Any</option>
                    <option value="Discoveryland">Discoveryland</option>
                    <option value="Disney Land">Disney Land</option>
                    <option value="Maplewood Heights">Maplewood Heights</option>
                </select>

                <!-- Sqft -->
                <label>Sqft</label>
                <select id="sqftCondition">
                    <option value="">Select</option>
                    <option value="gt">&gt;</option>
                    <option value="lt">&lt;</option>
                    <option value="eq">=</option>
                </select>
                <input type="number" id="sqftValue" placeholder="Enter sqft" />

                <!-- Price -->
                <label>Price</label>
                <select id="priceCondition">
                    <option value="">Select</option>
                    <option value="gt">&gt;</option>
                    <option value="lt">&lt;</option>
                    <option value="eq">=</option>
                </select>
                <input type="number" id="priceValue" placeholder="Enter price" />

                <!-- Apply Button -->
                <button onclick="applyAdvancedFilter()">Apply</button>

            </div>
        </div>
        </div>
        <p>Browse coworking spaces, meeting rooms, and private offices for rent in your city</p>
    </section>

    <h3 class="section-title">Workspaces</h3>

    <div class="workspace-container" id="workspace-list">
        <!-- Dynamic workspace cards will be inserted here -->
    </div>

    <!-- FOOTER -->
    <footer>
        Contact | Terms | Privacy | 2026 Workspace App
    </footer>

    <script src="/app.js"></script>

</body>

</html>
