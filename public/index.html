<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h2>LOGO</h2>
        <nav>
            <a href="#">About us</a>
            <a href="my_bookings.html">My Bookings</a>
            <a href="profile.html">My Profile</a>
            <button id="auth-btn" onclick="handleAuth()">Sign In</button>
        </nav>
    </header>

    <section class="hero">
        <h1>Find Your Perfect Workspace Anytime, Anywhere</h1>
        <div class="search-wrapper">
            <input id="searchInput" class="search-box" type="text" placeholder="Search Location..."

            <div id="searchDropdown" class="search-dropdown"></div>
        </div>
        <p>Browse coworking spaces, meeting rooms, and private offices for rent in your city</p>
    </section>

    <h3 class="section-title">Workspaces</h3>

    <div class="workspace-container" id="workspace-list">
        <!-- Dynamic workspace cards will be inserted here -->
    </div>

    <!-- FOOTER -->
    <footer>
        Contact | Terms | Privacy | 2026 Workspace App
    </footer>

    <script src="/app.js"></script>

</body>

</html>
