<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h2>LOGO</h2>
        <div>
            <a href="index.html">Browse Spaces</a>
            <a href="my_bookings.html">My Bookings</a>
            <a href="profile.html">My Profile</a>
        </div>
    </header>

    <div class="details-container">

        <div class="details-left">

            <p class="back-link">
                <a href="index.html">← Back to Browse Spaces</a>
            </p>

            <h2>Company Name</h2>
            <p class="location"> 123 Place Street, Cityname</p>

            <div class="main-image"></div>

            <div class="thumbnail-row">
                <div class="thumb"></div>
                <div class="thumb"></div>
                <div class="thumb"></div>
                <div class="thumb"></div>
            </div>

            <h3>Amenities</h3>
            <div class="amenities">
                <div class="amenities" id="amenitiesList"></div>
            </div>

            <p class="description" id="propertyDescription"></p>

            <div class="owner-box">
                <span class="avatar"></span>
                <div>
                    <strong id="ownerName"></strong>
                    <p id="ownerRole">Host</p>
                </div>
            </div>

        </div>

        <div class="details-right">

            <div class="booking-box">

                <h3>Select Time & Date</h3>

                <input type="date">

                <div class="time-row">
                    <div>
                        <label>Start Time</label>
                        <input type="time" id="startTime" />
                    </div>

                    <div>
                        <label>Duration</label>
                        <select id="duration">
                            <option value="">Select hours</option>
                            <option value="1">1 hour</option>
                            <option value="2">2 hours</option>
                            <option value="3">3 hours</option>
                            <option value="4">4 hours</option>
                            <option value="5">5 hours</option>
                            <option value="6">6 hours</option>
                            <option value="7">7 hours</option>
                            <option value="8">8 hours</option>
                            <option value="9">9 hours</option>
                            <option value="10">10 hours</option>
                            <option value="11">11 hours</option>
                        </select>
                    </div>
                </div>

                <div class="price-box">
                    <p>$0 x 0 hours <span>$0</span></p>
                    <p>Service fee <span>$0</span></p>
                    <hr>
                    <p><strong>Total</strong> <strong>$0</strong></p>
                </div>

                <button class="book-btn">Book Now</button>
                <p class="note">No Payment required yet</p>

            </div>

            <div class="calendar-box">
                <h4>March 2026</h4>

                <div class="calendar-grid">
                    <span>1</span><span>2</span><span>3</span><span>4</span>
                    <span>5</span><span>6</span><span>7</span>
                    <span>8</span><span>9</span><span>10</span>
                    <span>11</span><span>12</span><span>13</span>
                </div>
            </div>

        </div>

    </div>

    <footer>
        Contact | Terms | Privacy | Workspace 2026
    </footer>

</body>

<script src="/app.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", loadPropertyDetails);
</script>

</html>
